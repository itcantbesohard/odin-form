<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-up form</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
</head>

<body>
    <div class="page">

        <header class="hero">
            <div class="hero-bar">
                <img class="hero-img" src="assets/images/odin-lined.png" alt="Odin logo">
                <h1 class="hero-title">ODIN</p>
            </div>
            <div class="hero-credit">
                Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a>
                on <a href="https://unsplash.com/">Unsplash</a>
            </div>
        </header>

        <div class="content">
            <section class="description">
                <p>This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.
                    <br>Sign up <span>now</span> to get started.
                </p>
                <p>You <span>know </span>you want to.</p>
            </section>

            <section class="form-card">
                <h1>Let's do this!</h1>
                <form action="" method="post" class="form-sign-up">
                    <div class="field">
                        <label for="firstName">first name</label>
                        <input type="text" name="firstName" id="firstName">
                    </div>
                    <div class="field">
                        <label for="lastName">last name</label>
                        <input type="text" name="lastName" id="lastName">
                    </div>
                    <div class="field">
                        <label class="required" for="email">email</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="field">
                        <label for="phone">phone number</label>
                        <input type="tel" name="phone" id="phone">
                    </div>
                    <div class="field">
                        <label class="required" for="password">password</label>
                        <input type="password" name="password" id="password" minlength="8" required>
                    </div>
                    <div class="field">
                        <label class="required" for="confirmPassword">confirm password</label>
                        <input type="password" name="confirmPassword" id="confirmPassword" minlength="8" required>
                    </div>
                </form>
                <div class="info">
                    * Required
                </div>
            </section>

            <section class="cta">
                <button class="btn">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </section>
        </div>
    </div>
</body>

</html>
